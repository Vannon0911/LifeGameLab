name: Bug Report
description: Melde einen reproduzierbaren Fehler
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Danke fuer den Report. Bitte so konkret wie moeglich.
  - type: textarea
    id: what-happened
    attributes:
      label: Was ist passiert?
      description: Beschreibe das beobachtete Verhalten.
      placeholder: Kurz und praezise.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Was hast du erwartet?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduktionsschritte
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / Commit
      placeholder: z. B. main@abc1234
  - type: input
    id: environment
    attributes:
      label: Umgebung
      placeholder: Windows 11, Node 20, Chrome 130
